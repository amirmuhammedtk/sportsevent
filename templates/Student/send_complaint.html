{% extends 'Student/studentindex.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send Complaint</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Change complaint text color */
    #complaint {
      color: darkblue;   /* you can change to red, green, etc. */
      font-weight: 500;  /* make it slightly bolder */
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <h2 class="mb-4 text-center">✉️ Send Complaint</h2>
  <form action="/myapp/student_send_complaint/" method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label for="complaint" class="form-label fw-bold">Your Complaint</label>
      <textarea class="form-control" id="complaint" name="complaint" rows="4" required
        placeholder="Type your complaint here..."></textarea>
    </div>
    <div class="text-center">
      <button type="submit" class="btn btn-danger px-4">Send</button>
    </div>
  </form>
</div>
</body>
</html>
{% endblock %}
