{% extends 'Student/studentindex.html' %}
{% block body %}
<html>
<head>
    <title>Student Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Style labels */
        label {
            color: darkblue;
            font-weight: 600;
        }

        /* Style input text */
        input.form-control {
            color: darkgreen;   /* text typed inside inputs */
            font-weight: 500;
        }

        /* Optional: style headings */
        h2 {
            color: #0d6efd;  /* Bootstrap primary blue */
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">🔑 Change Password</h2>

    <form action="/myapp/Studentchangepasswordpost/" method="post" class="shadow p-4 rounded bg-light">
        {% csrf_token %}
        <div class="mb-3">
            <label>Current Password</label>
            <input type="password" name="currentpassword" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>New Password</label>
            <input type="password" name="newpassword" class="form-control" required
            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 6 or more characters">
        </div>

        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" name="confirmpassword" class="form-control" required>
        </div>
       {% for message in messages %}
        <div class="message">{{ message }}</div>
    {% endfor %}
        <div class="text-center">
            <button type="submit" class="btn btn-primary px-4">Change Password</button>
        </div>
    </form>
    {% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mt-3 text-center" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endfor %}
{% endif %}

</div>
</body>
</html>
{% endblock %}
