{% extends 'Student/studentindex.html' %}
{% block body %}
<div class="container mt-5">



  <div class="row justify-content-center">
    <div class="col-md-8">

      <!-- Card -->
      <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header bg-primary text-white text-center py-3">
          <h4 class="mb-0">✏️ Edit Profile</h4>
        </div>

        <div class="card-body p-4">
          <form action="/myapp/student_edit_profile/" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" value="{{ student.id }}" name="id">

            <!-- Name & DOB -->
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Name</label>
                <input type="text" name="name" value="{{ student.name }}" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Date of Birth</label>
                    <input type="date" name="dob" value="{{ student.dob|date:'Y-m-d' }}" class="form-control" required>

{#                <input type="date" name="dob" value="{{ student.dob }}" class="form-control" required>#}
              </div>
            </div>

            <!-- College & Department -->
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">College</label>
                <input type="text" name="college" value="{{ student.college }}" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Department</label>
                <input type="text" name="department" value="{{ student.department }}" class="form-control" required>
              </div>
            </div>

            <!-- Gender & Email -->
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Gender</label>
                <select name="gender" class="form-select" required>
                  <option value="Male" {% if student.gender == "Male" %}selected{% endif %}>Male</option>
                  <option value="Female" {% if student.gender == "Female" %}selected{% endif %}>Female</option>
                  <option value="Other" {% if student.gender == "Other" %}selected{% endif %}>Other</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Email</label>
                <input type="email" name="email" value="{{ student.email }}" class="form-control" required>
              </div>
            </div>

            <!-- Address -->
            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label fw-bold">Place</label>
                <input type="text" name="place" value="{{ student.place }}" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold">City</label>
                <input type="text" name="city" value="{{ student.city }}" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold">State</label>
                <input type="text" name="state" value="{{ student.state }}" class="form-control" required>
              </div>
            </div>

            <!-- Pincode & Phone -->
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Pincode</label>
                <input type="text" name="pincode" value="{{ student.pincode }}" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Phone</label>
                <input type="text" name="phone" value="{{ student.phone }}" class="form-control" required>
              </div>
            </div>

            <!-- Photo -->
            <div class="mb-3 text-center">
              <label class="form-label fw-bold d-block">Profile Photo</label>
              <img src="{{ student.photo }}" class="rounded-circle mb-3" width="120" height="120" style="object-fit: cover;">
              <input type="file" name="photo" class="form-control">
            </div>

            <!-- Submit -->
            <div class="text-center">
              <button type="submit" class="btn btn-success px-4">💾 Update Profile</button>
              <a href="/myapp/student_home/" class="btn btn-secondary px-4">Cancel</a>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
