{% extends 'Student/studentindex.html' %}
{% block body %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<form method="post" action="/myapp/student_add_review/{{ event.id }}" style="width:400px; margin:50px auto; padding:20px; border:1px solid #ccc; border-radius:10px; background-color:#f9f9f9;">
  {% csrf_token %}
  <textarea name="review" required
            style="width:100%; height:120px; padding:10px; border:1px solid #999; border-radius:5px; font-size:14px; resize:none;"
  placeholder="Type your  here..."></textarea>
  </textarea>
  <button type="submit" style="margin-top:10px; padding:10px 20px; background-color:#28a745; color:#fff; border:none; border-radius:5px; cursor:pointer; font-size:14px;">
    Submit Review
  </button>
</form>

</body>
</html>
{% endblock %}
