{% extends 'admins/index.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send Replay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Send Replay</h2>


  <form action="/myapp/adminSendReplay/" method="post">
    {% csrf_token %}



    <div class="mb-3">
      <label for="replay" class="form-label">Replay</label>
        <input type="hidden" value="{{ data.id }}" name="id">
      <textarea class="form-control" id="replay" required name="replay" rows="3" ></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Send Replay</button>
  </form>
</div>
</body>
</html>
{% endblock %}
