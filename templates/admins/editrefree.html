{% extends 'admins/index.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Referee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Edit Referee</h2>
  <form action="/myapp/editRefree/" method="post">
    {% csrf_token %}
    <input type="hidden" name="id" value="{{ data.id }}">

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" value="{{ data.name }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Gender</label>
      <select name="gender" class="form-control" required>
        <option value="Male" {% if data.gender == "Male" %}selected{% endif %}>Male</option>
        <option value="Female" {% if data.gender == "Female" %}selected{% endif %}>Female</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ data.email }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Mobile</label>
      <input type="text" name="mobile" class="form-control" value="{{ data.mobile }}" required>
    </div>

    <button type="submit" class="btn btn-success">Update Referee</button>
  </form>
</div>
</body>
</html>
{% endblock %}
