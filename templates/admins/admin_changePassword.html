{% extends 'admins/index.html' %}
{% block body %}
<html>
<head>
    <title>Admin Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Change Password</h2>

    <form action="/myapp/adminchangepasswordpost/" method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>Current Password</label>
            <input type="password" name="currentpassword" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>New Password</label>
            <input type="password" name="newpassword" class="form-control" required

                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 6 or more characters">

        </div>
        <div class="mb-3">
            <label>Confirm Password</label>
            <input type="password" name="confirmpassword" class="form-control" required>

        </div>
        {% for message in messages %}
        <div class="message">{{ message }}</div>
    {% endfor %}
        <button type="submit" class="btn btn-primary">Change Password</button>
    </form>


</div>
</body>
</html>
{% endblock %}
