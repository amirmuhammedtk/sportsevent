{% extends 'admins/index.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Referees</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2 class="mb-4">All Referees</h2>
  <table id="reviewsTable" class="table table-bordered table-striped">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Gender</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for i in data %}
      <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ i.name }}</td>
        <td>{{ i.gender }}</td>
        <td>{{ i.email }}</td>
        <td>{{ i.mobile }}</td>
        <td>
          <a href="/myapp/refree_viewEdit/{{ i.id }}" class="btn btn-sm btn-warning">Edit</a>
          <a href="/myapp/deleteRefree/{{ i.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this referee?')">Delete</a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="6" class="text-center">No referees found</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
</body>
</html>
{% endblock %}
