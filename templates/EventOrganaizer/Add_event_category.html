{% extends 'EventOrganaizer/organaizerindex.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Event Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <h2 class="mb-4">Add Event category</h2>
    <form action="/myapp/add_event_category_post/" method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="row mb-3">
        <label for="name" class="col-sm-4 col-form-label">Event Name</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" name="name" required>
        </div>
      </div>

    
      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Add Event</button>
        </div>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
