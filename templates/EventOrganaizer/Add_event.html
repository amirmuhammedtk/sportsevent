{% extends 'EventOrganaizer/organaizerindex.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Event Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <h2 class="mb-4">Add Event Category</h2>
    <form action="/myapp/addEventPost/" method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="row mb-3">
        <label for="name" class="col-sm-4 col-form-label">Event Category</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="name" name="name" required>
        </div>
      </div>

{#      <div class="row mb-3">#}
{#        <label for="meeturl" class="col-sm-4 col-form-label">Match Shedule</label>#}
{#        <div class="col-sm-8">#}
{#          <input type="datetime-local" class="form-control" id="meeturl" name="shedule">#}
{#        </div>#}
{#      </div>#}

{#      <div class="row mb-3">#}
{#        <label for="description" class="col-sm-4 col-form-label">Description</label>#}
{#        <div class="col-sm-8">#}
{#          <textarea class="form-control" id="description" name="Description" rows="3" required></textarea>#}
{#        </div>#}
{#      </div>#}

      <div class="row mb-3">
        <label for="eventtype" class="col-sm-4 col-form-label">Event Type</label>
        <div class="col-sm-8">
          <select class="form-control" id="eventtype" name="eventtype" required>
            <option value="">-- Select Event Type --</option>
            <option value="outdoor">Outdoor</option>
            <option value="indoor">Indoor</option>
          </select>
        </div>
      </div>


         <div class="row mb-3">
        <label for="eventtype" class="col-sm-4 col-form-label">Refree</label>
        <div class="col-sm-8">
          <select class="form-control" id="eventtype" name="refree" required>
              {% for i in data %}
            <option value="{{ i.id }}">{{ i.name }}</option>
              {% endfor %}
          </select>
        </div>
      </div>


      <div class="row mb-3">
        <label for="amount" class="col-sm-4 col-form-label">Location</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="amount" name="location" required>
        </div>
      </div>

      <div class="row mb-3">
        <label for="photo" class="col-sm-4 col-form-label">Event Photo</label>
        <div class="col-sm-8">
          <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required>
        </div>
      </div>

      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="submit" class="btn btn-primary">Add Event</button>
        </div>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
